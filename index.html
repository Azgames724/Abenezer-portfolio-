<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
:root{
  --bg:#000;--bg2:#040710;--bg3:#0a0f1e;
  --surface:rgba(255,255,255,.05);--border:rgba(255,255,255,.08);
  --text:#fff;--text2:rgba(255,255,255,.85);--text3:rgba(255,255,255,.6);
  --accent:#60c8ff;--accent2:#2196F3;
  --eth-g:#00a651;--eth-y:#ffc72c;--eth-r:#ed1c24;
  --radius:14px;
}
html,body{height:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* SPACE BG */
.space{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 100% 60% at 50% 0%,#04102a 0%,#000 65%)}
.star{position:absolute;border-radius:50%;background:#fff;will-change:opacity}
.bg-shoot{position:absolute;width:220px;height:1.5px;background:linear-gradient(90deg,rgba(96,200,255,.9),transparent);top:20%;left:-240px;transform:rotate(-14deg);filter:blur(.4px);animation:shoot1 16s linear infinite}
@keyframes shoot1{0%{left:-240px;opacity:0}3%{opacity:1}48%{left:110vw;opacity:0}100%{opacity:0}}
@keyframes blink{0%,100%{opacity:.1}50%{opacity:1}}
@keyframes glow{0%,100%{opacity:.4;transform:scale(.98)}50%{opacity:1;transform:scale(1.02)}}

/* PHONE */
.wrap{position:relative;z-index:2}
.phone-glow{position:absolute;inset:-50px;border-radius:100px;background:radial-gradient(ellipse at 50% 50%,rgba(96,200,255,.12),transparent 70%);pointer-events:none;z-index:-1;animation:glow 6s ease-in-out infinite}
.phone{
  width:320px;height:660px;position:relative;border-radius:54px;
  background:linear-gradient(148deg,#ddedf8 0%,#b2cfe3 6%,#7bafc9 15%,#4e8dbb 27%,#3876ad 43%,#4e8dbb 58%,#7bafc9 73%,#b2cfe3 88%,#d8eaf5 100%);
  padding:4px;
  box-shadow:0 0 0 1px rgba(255,255,255,.28),0 0 0 2.5px rgba(0,0,0,.3),0 60px 120px rgba(0,0,0,.9),0 24px 48px rgba(0,0,0,.55),inset 0 2px 0 rgba(255,255,255,.5),inset 0 -1px 0 rgba(0,0,0,.3)
}
.btn-power{position:absolute;right:-5.5px;top:160px;width:5.5px;height:70px;border-radius:0 5px 5px 0;background:linear-gradient(180deg,#c8dff0,#84b4cc,#c8dff0);box-shadow:2px 1px 6px rgba(0,0,0,.5),inset -1px 0 0 rgba(255,255,255,.4)}
.btn-vol{position:absolute;left:-5.5px;width:5.5px;height:44px;border-radius:5px 0 0 5px;background:linear-gradient(180deg,#c8dff0,#84b4cc,#c8dff0);box-shadow:-2px 1px 6px rgba(0,0,0,.5),inset 1px 0 0 rgba(255,255,255,.4)}
.btn-vol.up{top:140px}
.btn-vol.down{top:195px}
.btn-mute{position:absolute;left:-5.5px;top:104px;width:5.5px;height:26px;border-radius:5px 0 0 5px;background:linear-gradient(180deg,#c8dff0,#84b4cc,#c8dff0);box-shadow:-2px 1px 5px rgba(0,0,0,.45)}

.phone-inner{width:100%;height:100%;border-radius:50px;background:var(--bg2);overflow:hidden;position:relative;box-shadow:inset 0 0 0 1px rgba(255,255,255,.05),inset 0 3px 12px rgba(0,0,0,.85)}

/* NOTCH */
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:124px;height:34px;background:#000;border-radius:0 0 22px 22px;z-index:20;box-shadow:0 6px 20px rgba(0,0,0,.98)}
.notch::before{content:'';position:absolute;top:11px;left:50%;transform:translateX(-50%);width:36px;height:4px;border-radius:2px;background:#141414}
.notch::after{content:'';position:absolute;top:50%;right:20px;transform:translateY(-50%);width:11px;height:11px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#232323,#050505);box-shadow:0 0 0 1.5px #141414}

/* STATUS BAR */
.status-bar{position:absolute;top:0;left:0;right:0;height:42px;z-index:19;display:flex;align-items:flex-end;justify-content:space-between;padding:0 22px 7px}
.s-time{font-size:13.5px;font-weight:700;color:#fff;letter-spacing:-.02em;font-family:'Space Mono',monospace}
.s-icons{display:flex;align-items:center;gap:5px}
.batt{width:22px;height:11px;border:1.5px solid rgba(255,255,255,.7);border-radius:3.5px;position:relative;overflow:hidden}
.batt::after{content:'';position:absolute;right:-4.5px;top:50%;transform:translateY(-50%);width:2.5px;height:5px;background:rgba(255,255,255,.5);border-radius:0 2px 2px 0}
.batt-fill{height:100%;width:72%;background:#34e55a}

/* SCREEN */
.screen{position:absolute;top:0;left:0;right:0;bottom:82px;padding:46px 16px 16px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:radial-gradient(ellipse 140% 50% at 50% 0%,#050e24 0%,#010207 52%,#000 100%)}
.screen::-webkit-scrollbar{display:none}
.screen-stars{position:absolute;inset:0;pointer-events:none;z-index:0}
.scr-star{position:absolute;border-radius:50%;background:#fff}
.scr-shoot{position:absolute;width:68px;height:1px;background:linear-gradient(90deg,rgba(96,200,255,.9),transparent);top:70%;left:-80px;transform:rotate(-18deg);animation:shoot2 12s linear infinite 5s;z-index:1}
@keyframes shoot2{0%{left:-80px;opacity:0}5%{opacity:1}55%{left:110%;opacity:0}100%{opacity:0}}

/* PROFILE */
.profile{display:flex;flex-direction:column;align-items:center;padding:8px 0 18px;position:relative;z-index:2}
.avatar{width:78px;height:78px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;border:2.5px solid rgba(255,255,255,.2);box-shadow:0 8px 28px rgba(0,0,0,.7),0 0 0 5px rgba(96,200,255,.08);margin-bottom:12px;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;object-position:center 20%;border-radius:50%}
.profile-name{font-size:17px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
.profile-role{font-size:10.5px;font-weight:500;color:rgba(255,255,255,.45);letter-spacing:.08em;text-transform:uppercase}

/* SECTION */
.section{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.25);letter-spacing:.12em;text-transform:uppercase;margin:0 0 12px;position:relative;z-index:2}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px 0;justify-items:center;padding:0;position:relative;z-index:2;margin-bottom:4px}

/* APP */
.app{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:var(--text);cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;width:64px;transition:transform .1s}
.app:active{transform:scale(.95)}

.icon{width:54px;height:54px;border-radius:13px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;transition:transform .14s cubic-bezier(.2,.9,.2,1),box-shadow .14s;box-shadow:0 4px 10px rgba(0,0,0,.5),0 1px 3px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.22),inset 0 -1px 0 rgba(0,0,0,.25)}
.icon::after{content:'';position:absolute;inset:0;border-radius:13px;background:linear-gradient(180deg,rgba(255,255,255,.2),rgba(255,255,255,.04) 40%,transparent 55%);pointer-events:none;z-index:5}
.icon img{width:100%;height:100%;object-fit:cover;position:relative;z-index:2}
.icon-txt{width:100%;height:100%;position:relative;z-index:2;display:flex;align-items:center;justify-content:center}
.app:hover .icon{transform:scale(1.08);box-shadow:0 12px 28px rgba(0,0,0,.65)}
.app:active .icon{transform:scale(.82);box-shadow:0 2px 5px rgba(0,0,0,.5)}

.app-label{margin-top:6px;font-size:9.5px;font-weight:400;color:rgba(255,255,255,.85);text-align:center;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 5px rgba(0,0,0,.9)}

/* FOOTER */
.built{display:flex;align-items:center;justify-content:center;gap:4px;margin:22px 0 2px;color:rgba(255,255,255,.35);font-size:10px;position:relative;z-index:2}

/* DOCK */
.dock{position:absolute;bottom:0;left:0;right:0;height:82px;background:rgba(10,16,34,.92);backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-around;padding:0 20px 20px;z-index:15}
.dock .icon{width:50px;height:50px}
.dock .app-label{font-size:9px}
.home-bar{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:104px;height:4px;background:rgba(255,255,255,.28);border-radius:2px;z-index:16}

/* PANEL */
.panel-overlay{position:absolute;inset:0;border-radius:50px;background:rgba(0,0,0,.7);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);opacity:0;visibility:hidden;transition:opacity .3s;z-index:25}
.panel-overlay.show{opacity:1;visibility:visible}

.panel{position:absolute;bottom:0;left:0;right:0;max-height:85%;background:linear-gradient(172deg,#141e33 0%,#0b1121 100%);border:1px solid rgba(255,255,255,.08);border-radius:28px 28px 50px 50px;padding:0 20px 32px;opacity:0;visibility:hidden;z-index:26;transform:translateY(110%);transition:transform .4s cubic-bezier(.14,.9,.2,1),opacity .3s,visibility 0s .4s;overflow-y:auto;scrollbar-width:none;box-shadow:0 -32px 90px rgba(0,0,0,.85)}
.panel.show{opacity:1;visibility:visible;transform:translateY(0);transition:transform .4s cubic-bezier(.14,.9,.2,1),opacity .3s}
.panel::-webkit-scrollbar{display:none}

.p-handle{width:36px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:13px auto 18px}
.p-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.p-head h2{font-size:18px;font-weight:700;letter-spacing:-.025em}
.close-btn{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .1s}
.close-btn:hover{background:rgba(255,255,255,.2)}
.close-btn:active{transform:scale(.9)}

.pbody{color:rgba(255,255,255,.7);font-size:13.5px;line-height:1.7}
.pbody p{margin-bottom:12px}
.pbody strong{color:#fff;font-weight:600}
.pbody a{color:var(--accent);text-decoration:none;font-weight:500}
.pbody a:hover{text-decoration:underline}

.psec{font-size:10.5px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em;margin:20px 0 10px}
.psec:first-child{margin-top:4px}

.tag{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;background:rgba(255,255,255,.07);font-size:11.5px;margin:3px;color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.08)}

.lc{display:flex;align-items:center;gap:13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:13px 14px;margin-bottom:9px;text-decoration:none;color:inherit;transition:background .18s,border-color .18s,transform .12s}
.lc:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.14)}
.lc:active{transform:scale(.98)}
.lc-ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.lc-info{flex:1;min-width:0}
.lc-info h3{font-size:13.5px;font-weight:600;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lc-info p{font-size:11.5px;color:rgba(255,255,255,.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lc-arr{color:rgba(255,255,255,.2);font-size:20px;font-weight:300}

.pdiv{height:1px;background:rgba(255,255,255,.06);margin:16px 0;border-radius:1px}

/* SKILL BAR */
.skill{margin-bottom:14px}
.skill-name{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.8);margin-bottom:6px;display:flex;justify-content:space-between}
.skill-name span{color:rgba(255,255,255,.4);font-size:11px}
.skill-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.skill-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:3px;transition:width .6s cubic-bezier(.14,.9,.2,1)}
</style>
</head>
